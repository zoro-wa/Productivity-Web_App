<!DOCTYPE html>>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
                <link href="/static/favicon.ico" rel="icon">
                <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
                <title>{% block title %}Productivity App{% endblock %}</title>
    </head>
    <body class="bg-light">
        
        <nav class="navbar navbar-expand-lg  border-bottom" style="background-color: var(--surface);">
            <div class="container-fluid">
                <a class ="navbar-brand fw-bold" href="/" style="color: var(--text-primary);">Productivity App</a>

                <div class="ms-auto d-flex gap-2">
                    {% if session.user_id %}
                    <a href="/logout" class="btn btn-outline-secondary rounded-pill">Logout</a>
                    <a href="/profile" class="btn btn-outline-primary rounded-pill">Profile</a>
                    {% else %}
                    <a href="/login" class="btn btn-outline-primary rounded-pill">
                        Login
                    </a>
                    {% endif %}
        
                </div>
            </div>
        </nav>


        <main class="container py-5">
            {% block content %}{% endblock %}
        </main>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        
        <script>
            if ("Notification" in window) {
                Notification.requestPermission();
            }
            
            
            function checkReminders() {
                fetch("/check_reminders")
                    .then(res => res.json())
                    .then(tasks => {
                        tasks.forEach(task => {
                            if (Notification.permission === "granted") {
                                new Notification("⏰ Task Reminder", {
                                    body:task.title,
                                    icon: "/static/favicon.ico"
                                });
                            }
                        });
                    })
                    .catch(()  => {});
            }

            // checkReminders();
            setInterval(checkReminders, 60000);
        </script>

    </body>
</html>
