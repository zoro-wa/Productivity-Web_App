{% extends "layout.html" %}
{% block content %}

<div class="dashboard-container">


    <div class="card stat-card p-4 mb-4">
        <div class="d-flex align-items-center gap-4">
            {% if user['profile_pic'] %}
            <img src="/static/uploads/{{ user['profile_pic'] }}"
                 alt="Profile Picture"
                 class="profile-avatar-img">
            {% else %}
            <div class="profile-avatar-placeholder">
                {{ user['username'][0].upper() }}
            </div>
            {% endif %}
            <div>
                <h1 class="page-heading">{{ user['username'] }}</h1>
                <p class="profile-email">{{ user['email'] }}</p>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6">
            <div class="card p-3 text-center">
                <h2  class="stat-number">{{ task_count }}</h2>
                <p class="stat-label">Total Tasks</p>
            </div>
        </div>
        <div class="col-6">
            <div class="card p-3 text-center">
                <h2 class="stat-number">{{ completed_count }}</h2>
                <p class="stat-label">Completed</p>
            </div>
        </div>
    </div>
    
    <div class="card stat-card p-4">
        <h2 class="section-title">Update Profile Picture</h2>
        <form action="/upload_profile_pic" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="profile_pic"  accept="image/*" required
                       style="display: none;" id="profile_pic_input">
                <label for="profile_pic_input" class="btn rounded-pill px-4"
                       style="background: var(--accent-light); color: var(--accent); border: none; cursor: pointer;">
                    Choose Image    
                </label>
                <span id="file_name" style="color: var(--text-muted); font-size: 0.9rem; margin-left: 0.5rem;">No file choosen</span>
            </div>
            <button type="submit" class="btn rounded-pill px-4"
                    style="background: var(--accent); color: white; border: none;">
                Upload    
            </button>
        </form>
    </div>
    

</div>

<script>
    document.getElementById('profile_pic_input').addEventListener('change', function() {
        const name = this.files[0] ? this.files[0].name: 'No file chosen';
        document.getElementById('file_name').textContent = name;
    });
</script>

{% endblock %}
